# a mybinder.org-ready environment for demoing jupyterlab-plugin-playground
# this environment may also be used locally on Linux/MacOS/Windows, e.g.
#
#   conda env update --file binder/environment.yml
#   conda activate jupyterlab-plugin-playground-demo
#
name: jupyterlab-plugin-playground-demo

channels:
  - conda-forge

dependencies:
  # runtime dependencies
  - python >=3.10,<3.13.0a0
  - jupyterlab >=4,<5.0.0a0
  # labextension build dependencies
  - nodejs >=18,<21
  - pip
  - wheel
  # additional packages for demos
  # - ipywidgets
  - jupyterlab-lsp
  - jupyterlab-js-logs>=1,<2
  # install stable Jupyter AI on Binder; move to v3 when it is released
  - pip:
      - jupyter-ai==3.0.0b9 #currently using Jupyter AI v3 pre-release
      - jupyter-ai-jupyternaut==0.0.10
      # expose command discovery/execution tools via MCP for AI assistants
      - jupyterlab_commands_toolkit[mcp]>=0.1,<1
